name: Build

on:
  workflow_call:
    inputs:
      service_name:
        description: 'Nombre del servicio'
        required: true
        type: string

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ${{ inputs.service_name }}:latest .
          echo "✅ Imagen ${{ inputs.service_name }}:latest buildeada correctamente"