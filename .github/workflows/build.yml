name: Build

on:
  workflow_call:
    inputs:
      service_name:
        description: 'Nombre del servicio'
        required: true
        type: string
      ecr_repo:
        description: 'Repositorio ECR destino (main o develop). Por defecto usa la rama destino del PR o la rama actual.'
        type: string
        default: ''
      custom_tag:
        description: 'Tag personalizado (opcional, por defecto usa BRANCH-SHORT_SHA)'
        type: string
        default: ''
      push_latest:
        description: 'Si debe pushear el tag latest'
        type: boolean
        default: false
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_ACCOUNT_ID:
        required: true
    outputs:
      image_uri:
        description: 'URI completa de la imagen pusheada'
        value: ${{ jobs.build.outputs.image_uri }}
      image_tag:
        description: 'Tag de la imagen pusheada'
        value: ${{ jobs.build.outputs.image_tag }}

jobs:
  build:
    name: CI Passed
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.build.outputs.image_uri }}
      image_tag: ${{ steps.build.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TARGET_BRANCH: ${{ inputs.ecr_repo != '' && inputs.ecr_repo || github.base_ref || github.ref_name }}
          SERVICE: ${{ inputs.service_name }}
          SHA: ${{ github.sha }}
          CUSTOM_TAG: ${{ inputs.custom_tag }}
          PUSH_LATEST: ${{ inputs.push_latest }}
        run: |
          SHORT_SHA="${SHA::7}"
          BRANCH_TAG="${TARGET_BRANCH}-${SHORT_SHA}"
          FINAL_TAG="${CUSTOM_TAG:-$BRANCH_TAG}"
          IMAGE_URI="$ECR_REGISTRY/$TARGET_BRANCH/$SERVICE:$FINAL_TAG"

          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"

          # Tag latest si corresponde
          if [ "$PUSH_LATEST" = "true" ]; then
            LATEST_URI="$ECR_REGISTRY/$TARGET_BRANCH/$SERVICE:latest"
            docker tag "$IMAGE_URI" "$LATEST_URI"
            docker push "$LATEST_URI"
            echo "✅ Tag latest pusheado: $LATEST_URI"
          fi

          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT
          echo "image_tag=$FINAL_TAG" >> $GITHUB_OUTPUT

      - name: Image Summary
        run: |
          echo "## 🐳 Imagen generada" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **URI completa** | \`${{ steps.build.outputs.image_uri }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag** | \`$FINAL_TAG\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **ECR repo** | \`$TARGET_BRANCH\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
        env:
          FINAL_TAG: ${{ steps.build.outputs.image_uri }}