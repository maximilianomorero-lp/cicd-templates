name: Deploy

on:
  workflow_call:
    inputs:
      service_name:
        description: 'Nombre del servicio'
        required: true
        type: string
      image_uri:
        description: 'URI completa de la imagen a deployar'
        required: true
        type: string
      cluster:
        description: 'Nombre del cluster ECS'
        required: true
        type: string
      ecs_service:
        description: 'Nombre del servicio ECS'
        required: true
        type: string
      task_definition:
        description: 'Nombre de la task definition'
        required: true
        type: string
      container_name:
        description: 'Nombre del container en la task definition'
        required: true
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true

jobs:
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Download task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ inputs.task_definition }} \
            --query taskDefinition \
            > task-definition.json

      - name: Update image in task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ inputs.container_name }}
          image: ${{ inputs.image_uri }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          cluster: ${{ inputs.cluster }}
          service: ${{ inputs.ecs_service }}
          wait-for-service-stability: true