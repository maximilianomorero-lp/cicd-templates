name: Deploy

on:
  workflow_call:
    inputs:
      service_name:
        description: 'Nombre del servicio'
        required: true
        type: string
      environment:
        description: 'Ambiente destino (stage o production)'
        required: true
        type: string
      image_tag:
        description: 'Tag de la imagen (ej: develop-a1b2c3d o main-a1b2c3d)'
        required: true
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      SLACK_WEBHOOK_URL:
        required: true

jobs:
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      deployments: write

    steps:
      - name: Create GitHub Deployment
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: '${{ inputs.environment }}',
              description: 'Tag: ${{ inputs.image_tag }}',
              auto_merge: false,
              required_contexts: []
            });
            core.setOutput('deployment_id', deployment.data.id);

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Resolve image URI and cluster
        id: resolve
        env:
          ENV: ${{ inputs.environment }}
          TAG: ${{ inputs.image_tag }}
          SERVICE: ${{ inputs.service_name }}
        run: |
          ECR_REPO=$(echo "$TAG" | cut -d'-' -f1)
          ACCOUNT="693613560166"
          REGION="us-east-1"

          IMAGE_URI="$ACCOUNT.dkr.ecr.$REGION.amazonaws.com/$ECR_REPO/$SERVICE:$TAG"
          CLUSTER="$ENV"
          TASK_DEF="$ENV-$SERVICE"
          CONTAINER="$ENV-$SERVICE"

          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT
          echo "cluster=$CLUSTER" >> $GITHUB_OUTPUT
          echo "task_def=$TASK_DEF" >> $GITHUB_OUTPUT
          echo "container=$CONTAINER" >> $GITHUB_OUTPUT

          echo "📦 Imagen: $IMAGE_URI"
          echo "🏗️ Cluster: $CLUSTER"

      - name: Download task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ steps.resolve.outputs.task_def }} \
            --query taskDefinition \
            > task-definition.json

      - name: Update image in task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ steps.resolve.outputs.container }}
          image: ${{ steps.resolve.outputs.image_uri }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          cluster: ${{ steps.resolve.outputs.cluster }}
          service: ${{ steps.resolve.outputs.task_def }}
          wait-for-service-stability: true

      - name: Update GitHub Deployment status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: '${{ steps.deployment.outputs.deployment_id }}',
              state: '${{ job.status }}' === 'success' ? 'success' : 'failure',
              description: 'Tag: ${{ inputs.image_tag }} — Actor: ${{ github.actor }}'
            });

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "${{ job.status == 'success' && '✅ Deploy exitoso' || '❌ Deploy fallido' }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Servicio:*\n`${{ inputs.service_name }}`" },
                    { "type": "mrkdwn", "text": "*Ambiente:*\n`${{ inputs.environment }}`" },
                    { "type": "mrkdwn", "text": "*Tag:*\n`${{ inputs.image_tag }}`" },
                    { "type": "mrkdwn", "text": "*Usuario:*\n${{ github.actor }}" },
                    { "type": "mrkdwn", "text": "*Estado:*\n`${{ job.status }}`" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [{
                    "type": "button",
                    "text": { "type": "plain_text", "text": "Ver pipeline" },
                    "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }]
                }
              ]
            }