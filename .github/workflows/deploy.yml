name: Deploy

on:
  workflow_call:
    inputs:
      service_name:
        description: 'Nombre del servicio'
        required: true
        type: string
      image_uri:
        description: 'URI completa de la imagen a deployar'
        required: true
        type: string
      cluster:
        description: 'Nombre del cluster ECS'
        required: true
        type: string
      ecs_service:
        description: 'Nombre del servicio ECS'
        required: true
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true

jobs:
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update ECS Task Definition
        id: task-def
        env:
          SERVICE: ${{ inputs.ecs_service }}
          IMAGE: ${{ inputs.image_uri }}
        run: |
          # Obtener task definition actual
          TASK_FAMILY="$SERVICE"

          CURRENT_TASK=$(aws ecs describe-task-definition \
            --task-definition "$TASK_FAMILY" \
            --query 'taskDefinition' \
            --output json)

          # Reemplazar imagen y limpiar campos inmutables
          NEW_TASK=$(echo "$CURRENT_TASK" | jq \
            --arg IMAGE "$IMAGE" \
            '.containerDefinitions[0].image = $IMAGE
            | del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .placementConstraints,
                .compatibilities,
                .registeredAt,
                .registeredBy
              )')

          NEW_TASK_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "new_task_arn=$NEW_TASK_ARN" >> $GITHUB_OUTPUT
          echo "✅ Nueva task definition: $NEW_TASK_ARN"

      - name: Deploy to ECS Service
        env:
          CLUSTER: ${{ inputs.cluster }}
          SERVICE: ${{ inputs.ecs_service }}
          TASK_ARN: ${{ steps.task-def.outputs.new_task_arn }}
        run: |
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --task-definition "$TASK_ARN"

          echo "🚀 Deploy iniciado en $CLUSTER/$SERVICE"

      - name: Wait for stability
        env:
          CLUSTER: ${{ inputs.cluster }}
          SERVICE: ${{ inputs.ecs_service }}
        run: |
          echo "⏳ Esperando que ECS estabilice..."
          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services "$SERVICE"
          echo "✅ Servicio estable"