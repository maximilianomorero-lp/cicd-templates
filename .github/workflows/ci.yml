name: CI
on:
  workflow_call:
    inputs:
      service_name:
        description: 'Nombre del servicio'
        required: true
        type: string
    # secrets:
    #   SONAR_TOKEN:
    #     required: true
    #   SONAR_HOST_URL:
    #     required: true

jobs:
  ci:
    name: CI Passed
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build test image
        run: docker build -f Dockerfile.test -t ${{ inputs.service_name }}-test .

      - name: Run tests and extract coverage report
        run: |
          docker run --name test-container ${{ inputs.service_name }}-test
          docker cp test-container:/app/target ./target
          docker rm test-container

