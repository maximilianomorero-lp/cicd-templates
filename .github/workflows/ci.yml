name: CI

on:
  workflow_call:
    inputs:
      service_name:
        description: 'Nombre del servicio'
        required: true
        type: string

jobs:
  ci:
    name: CI Passed
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build test image
        run: docker build -f Dockerfile.test -t ${{ inputs.service_name }}-test .

      - name: Run tests
        run: docker run --rm ${{ inputs.service_name }}-test